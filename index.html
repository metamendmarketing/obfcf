<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Oak Bay Firefighters Foundation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <section class="hero fade-in">
      <div class="hero-content">
        <h1 class="hero-title">Protecting Our Community. <br/><span class="highlight">Empowering Our Future.</span></h1>
        <p class="hero-subtitle">The Oak Bay Firefighters Charitable Foundation is dedicated to funding local initiatives, youth programs, and community projects.</p>
        <div class="hero-actions">
          <a href="projects.html" class="btn-secondary">View Our Projects</a>
          <a href="https://www.canadahelps.org/en/charities/oak-bay-fire-fighters-charitable-foundation/" target="_blank" rel="noopener noreferrer" class="btn-primary pulse">Support Our Mission</a>
        </div>
      </div>
      <div class="hero-decoration"></div>
    </section>

    <section class="section bg-light slide-up visible">
      <div class="container">
        <div class="section-header">
          <h2>Our Impact</h2>
          <div class="divider"></div>
          <p class="section-desc">See the difference your support makes in our community.</p>
        </div>
        <div class="infographic-container">
          <img src="/impact.jpg" alt="Our $80,000 impact back into the community last year" class="infographic-img" onerror="this.src='https://via.placeholder.com/800x1000?text=Save+Infographic+as+impact.jpg+in+public+folder'">
        </div>
      </div>
    </section>
    <div id="footer-placeholder"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
