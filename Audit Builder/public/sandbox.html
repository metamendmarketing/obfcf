<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Design Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            padding: 3rem;
        }

        /* Base TipTap Table Classes (Simulated) */
        table { width: 100%; border-collapse: collapse; margin-bottom: 2rem; }
        th, td { padding: 1rem; text-align: left; }

        /* Design 1: Modern Minimalist */
        .table-minimalist {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .table-minimalist thead {
            background-color: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }
        .table-minimalist th {
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .table-minimalist td {
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.875rem;
        }
        .table-minimalist tbody tr:hover {
            background-color: #f8fafc;
        }

        /* Design 2: High-Contrast Corporate */
        .table-corporate {
            border: 1px solid #d1d5db;
            background: white;
        }
        .table-corporate thead {
            background-color: #1e293b;
            color: white;
        }
        .table-corporate th {
            font-weight: 600;
            font-size: 0.875rem;
            border-right: 1px solid #334155;
        }
        .table-corporate th:last-child {
            border-right: none;
        }
        .table-corporate td {
            color: #111827;
            border-bottom: 1px solid #d1d5db;
            border-right: 1px solid #e5e7eb;
            font-size: 0.875rem;
        }
        .table-corporate td:last-child {
            border-right: none;
        }
        .table-corporate tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        /* Design 3: The "Sealeze" Brand (Blue Accents) */
        .table-branded {
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-top: 4px solid #0057FF;
        }
        .table-branded thead {
            border-bottom: 2px solid #0057FF;
        }
        .table-branded th {
            font-weight: 700;
            color: #111827;
            font-size: 0.9rem;
        }
        .table-branded td {
            color: #374151;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.9rem;
        }
        .table-branded tbody tr:hover td {
            background-color: #eff4ff;
            color: #0057FF;
        }
        .table-branded td:first-child {
            font-weight: 600;
            color: #111827;
        }
    </script>
</head>
<body>
    <div class="max-w-5xl mx-auto space-y-16">
        
        <div class="text-center mb-12">
            <h1 class="text-3xl font-bold text-gray-900">Table Design Concepts</h1>
            <p class="text-gray-500 mt-2">Compare the aesthetics below.</p>
        </div>

        <!-- Concept 1 -->
        <div>
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-sm">Option 1</span> Modern Minimalist
            </h2>
            <p class="text-gray-500 mb-6 text-sm">Clean, airy, relies on subtle whitespace and soft backgrounds. Great for modern SaaS reports.</p>
            <table class="table-minimalist">
                <thead>
                    <tr>
                        <th>Keyword Group</th>
                        <th>Search Volume</th>
                        <th>Avg. CPC</th>
                        <th>Competition Level</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Nylon Strip Brushes</td>
                        <td>2,400 / mo</td>
                        <td>$2.45</td>
                        <td><span class="text-emerald-600 font-medium">Low</span></td>
                    </tr>
                    <tr>
                        <td>Industrial Weather Seals</td>
                        <td>1,200 / mo</td>
                        <td>$4.12</td>
                        <td><span class="text-amber-600 font-medium">Medium</span></td>
                    </tr>
                    <tr>
                        <td>Custom Brush Manufacturing</td>
                        <td>850 / mo</td>
                        <td>$7.80</td>
                        <td><span class="text-rose-600 font-medium">High</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Concept 2 -->
        <div>
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-sm">Option 2</span> High-Contrast Corporate
            </h2>
            <p class="text-gray-500 mb-6 text-sm">Strict grid lines, bold dark headers. Excellent for dense financial or metric-heavy data.</p>
            <table class="table-corporate">
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Current Quarter</th>
                        <th>Previous Quarter</th>
                        <th>% Change</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Organic Traffic</td>
                        <td>45,210</td>
                        <td>42,100</td>
                        <td class="text-emerald-600 font-bold">+7.4%</td>
                    </tr>
                    <tr>
                        <td>Bounce Rate</td>
                        <td>42.1%</td>
                        <td>48.5%</td>
                        <td class="text-emerald-600 font-bold">-6.4%</td>
                    </tr>
                    <tr>
                        <td>Conversion Rate</td>
                        <td>2.4%</td>
                        <td>2.1%</td>
                        <td class="text-emerald-600 font-bold">+0.3%</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Concept 3 -->
        <div>
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-sm">Option 3</span> The "Sealeze" Brand
            </h2>
            <p class="text-gray-500 mb-6 text-sm">Uses the primary brand blue (#0057FF) for accents. Elegant row hover states. Premium agency feel.</p>
            <table class="table-branded">
                <thead>
                    <tr>
                        <th>Competitor</th>
                        <th>Domain Authority</th>
                        <th>Linking Domains</th>
                        <th>Content Gap</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Sealeze (Client)</td>
                        <td>42</td>
                        <td>1,240</td>
                        <td>Baseline</td>
                    </tr>
                    <tr>
                        <td>Spiral Brushes</td>
                        <td>38</td>
                        <td>890</td>
                        <td>Stronger Technical SEO</td>
                    </tr>
                    <tr>
                        <td>Bolex</td>
                        <td>45</td>
                        <td>2,100</td>
                        <td>Missing 40+ category pages</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
